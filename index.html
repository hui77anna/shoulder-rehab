<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="肩·康复">
<meta name="theme-color" content="#2E8B7F">
<title>肩 · 8 周康复</title>
<style>
  :root{
    --bg:#EEF2F1; --card:#FFFFFF; --ink:#1C2B2E; --ink2:#5B6E72; --ink3:#93A2A4;
    --line:#E4EAE9; --accent:#2E8B7F; --accent-soft:#E2F0ED; --warm:#E08A4E;
    --warm-soft:#FBEEE2; --ok:#3DA17A;
    --body:#C6D4D6; --body-h:#B2C4C6; --limb:#2E6B7E; --limb-d:#214E5C;
    --figbg:#F1F7F6;
    --p1:#7BB0A8; --p2:#4F8F86; --p3:#2E8B7F; --p4:#1F6E63;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"PingFang SC","Hiragino Sans GB",system-ui,-apple-system,sans-serif;
    background:var(--bg); color:var(--ink);
    -webkit-font-smoothing:antialiased; line-height:1.55;
    padding-bottom:calc(72px + env(safe-area-inset-bottom));
  }
  .wrap{max-width:520px;margin:0 auto;padding:0 16px;}

  /* ---- top header ---- */
  .topbar{
    position:sticky;top:0;z-index:30;background:rgba(238,242,241,.86);
    backdrop-filter:saturate(150%) blur(12px);-webkit-backdrop-filter:saturate(150%) blur(12px);
    padding:calc(env(safe-area-inset-top) + 14px) 16px 12px;border-bottom:1px solid var(--line);
  }
  .topbar .wrap{padding:0;display:flex;align-items:baseline;justify-content:space-between;}
  .brand{font-size:18px;font-weight:700;letter-spacing:.5px;}
  .brand small{font-weight:500;color:var(--ink2);font-size:13px;margin-left:6px;letter-spacing:0;}
  .topmeta{font-size:12px;color:var(--ink3);}

  section{display:none;}
  section.active{display:block;}
  .pad{padding-top:18px;}

  h2.sec{font-size:15px;font-weight:700;margin:26px 2px 12px;color:var(--ink);}
  h2.sec:first-child{margin-top:18px;}

  /* ---- today summary ---- */
  .summary{
    background:linear-gradient(135deg,#2E8B7F,#1F6E63);color:#fff;border-radius:22px;
    padding:20px 22px;display:flex;align-items:center;gap:20px;margin-top:6px;
  }
  .ring{flex:0 0 auto;}
  .ring text{font-family:inherit;}
  .sum-info{flex:1;min-width:0;}
  .sum-info .day{font-size:24px;font-weight:700;line-height:1.2;}
  .sum-info .ph{font-size:13px;opacity:.92;margin-top:4px;}
  .sum-info .goal{font-size:12px;opacity:.8;margin-top:8px;border-top:1px solid rgba(255,255,255,.25);padding-top:8px;}
  .streak{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.18);
    border:1px solid rgba(255,255,255,.32);border-radius:20px;padding:4px 11px;font-size:12px;
    font-weight:600;margin-top:9px;}
  .streak .fl{font-size:13px;}

  /* ---- check-in calendar ---- */
  .cal{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:16px 16px 14px;margin-top:14px;}
  .cal-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;}
  .cal-h .ct{font-size:14px;font-weight:700;}
  .cal-h .cs{font-size:12px;color:var(--ink3);}
  .calrow{display:flex;align-items:center;gap:7px;margin-bottom:7px;}
  .calrow:last-child{margin-bottom:0;}
  .calrow .wk{flex:0 0 26px;font-size:10px;font-weight:700;color:var(--ink3);letter-spacing:.3px;}
  .calgrid{flex:1;display:grid;grid-template-columns:repeat(7,1fr);gap:7px;}
  .cell{aspect-ratio:1;border-radius:9px;display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:600;color:var(--ink3);background:#EDF2F1;border:1.5px solid transparent;}
  .cell.done{background:var(--accent);color:#fff;}
  .cell.part{background:var(--accent-soft);color:var(--accent);}
  .cell.future{background:#F5F8F7;color:#C4D0D0;}
  .cell.today{border-color:var(--accent);}
  .cell.empty{background:transparent;}
  .calleg{display:flex;gap:14px;margin-top:12px;flex-wrap:wrap;}
  .calleg span{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--ink3);}
  .calleg i{width:11px;height:11px;border-radius:3px;display:inline-block;}

  /* ---- check item ---- */
  .check{
    display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);
    border-radius:15px;padding:13px 15px;margin-bottom:9px;cursor:pointer;
    transition:transform .08s ease, border-color .2s;
  }
  .check:active{transform:scale(.985);}
  .box{
    flex:0 0 24px;height:24px;border-radius:8px;border:2px solid #CBD6D6;
    display:flex;align-items:center;justify-content:center;transition:all .18s;
  }
  .box svg{width:14px;height:14px;opacity:0;transform:scale(.6);transition:all .18s;}
  .check.done .box{background:var(--ok);border-color:var(--ok);}
  .check.done .box svg{opacity:1;transform:scale(1);}
  .check .ci-name{font-size:15px;font-weight:600;flex:1;}
  .check .ci-dose{font-size:12px;color:var(--ink3);margin-top:2px;}
  .check.done .ci-name{color:var(--ink3);text-decoration:line-through;text-decoration-color:#C5D0D0;}
  .ci-thumb{flex:0 0 54px;width:54px;height:54px;border-radius:12px;object-fit:cover;background:var(--figbg);display:block;}
  .check.done .ci-thumb{opacity:.55;}
  .serve-note{
    background:var(--warm-soft);border:1px solid #F1DAC4;border-radius:15px;padding:13px 15px;
    font-size:13px;color:#9A5A28;margin-bottom:9px;display:flex;gap:10px;align-items:flex-start;
  }
  .serve-note b{color:#7E4519;}
  .serve-note .ic{flex:0 0 auto;font-size:15px;}

  /* ---- exercise card ---- */
  .ex{background:var(--card);border:1px solid var(--line);border-radius:20px;overflow:hidden;margin-bottom:14px;}
  .ex-fig{position:relative;background:#000;display:block;}
  .vstage{position:relative;min-height:120px;background:#000;overflow:hidden;}
  .vstage > img.figgif{display:block;width:100%;max-height:360px;object-fit:contain;background:#000 center/contain no-repeat;vertical-align:middle;}
  .vp{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:#cfe3df;background:#16302d;font-size:13px;font-weight:600;text-decoration:none;}
  .vp-ic{font-size:20px;opacity:.9;}
  .badge{
    position:absolute;top:11px;left:12px;z-index:3;background:rgba(255,255,255,.85);color:var(--accent);
    font-size:11px;font-weight:600;padding:4px 9px;border-radius:20px;border:1px solid var(--accent-soft);
  }
  .playbtn{
    position:absolute;bottom:12px;right:12px;z-index:3;display:flex;align-items:center;gap:6px;
    background:rgba(26,40,42,.82);color:#fff;border:none;border-radius:20px;
    padding:8px 14px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;
    backdrop-filter:blur(4px);transition:transform .08s;
  }
  .playbtn:active{transform:scale(.96);}
  .playbtn .pt-ic{font-size:10px;}
  .ex-fig.hasvideo{height:auto;background:#000;display:block;padding:0;}
  .vwrap{position:relative;width:100%;padding-top:62%;background:#000;}
  .vwrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0;}
  .vopen{display:block;text-align:center;font-size:12px;color:var(--ink3);background:var(--card);padding:9px;text-decoration:none;border-bottom:1px solid var(--line);}
  .ex-body{padding:15px 17px 17px;}
  .ex-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;}
  .ex-name{font-size:17px;font-weight:700;}
  .ex-en{font-size:11px;color:var(--ink3);font-weight:500;margin-top:1px;letter-spacing:.3px;}
  .ex-dose{font-size:12px;font-weight:600;color:var(--accent);background:var(--accent-soft);padding:4px 10px;border-radius:8px;white-space:nowrap;}
  .ex-how{font-size:13.5px;color:var(--ink2);margin:11px 0 0;line-height:1.6;}
  .ex-points{list-style:none;padding:0;margin:12px 0 0;display:flex;flex-direction:column;gap:6px;}
  .ex-points li{font-size:13px;color:var(--ink);padding-left:18px;position:relative;}
  .ex-points li::before{content:"";position:absolute;left:2px;top:8px;width:6px;height:6px;border-radius:50%;background:var(--accent);}
  .donebtn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;margin-top:15px;background:#FAFCFB;border:1px solid var(--line);border-radius:13px;padding:11px 14px;font-size:14px;font-weight:600;font-family:inherit;color:var(--ink2);cursor:pointer;transition:transform .08s,background .2s,border-color .2s,color .2s;}
  .donebtn:active{transform:scale(.98);}
  .donebtn .db-box{flex:0 0 22px;height:22px;border-radius:7px;border:2px solid #CBD6D6;display:flex;align-items:center;justify-content:center;transition:all .18s;}
  .donebtn .db-box svg{width:13px;height:13px;opacity:0;transform:scale(.6);transition:all .18s;}
  .donebtn.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);}
  .donebtn.on .db-box{background:var(--ok);border-color:var(--ok);}
  .donebtn.on .db-box svg{opacity:1;transform:scale(1);}

  /* ---- moves filter segmented ---- */
  .segwrap{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;
    margin:0 -16px 4px;padding:2px 16px 6px;scrollbar-width:none;}
  .segwrap::-webkit-scrollbar{display:none;}
  .seg{flex:0 0 auto;border:1px solid var(--line);background:var(--card);color:var(--ink2);
    border-radius:20px;padding:8px 15px;font-size:13px;font-weight:600;font-family:inherit;
    cursor:pointer;white-space:nowrap;transition:transform .08s,background .15s,color .15s,border-color .15s;}
  .seg:active{transform:scale(.96);}
  .seg.on{background:var(--accent);border-color:var(--accent);color:#fff;}
  .seghint{font-size:12.5px;color:var(--ink3);margin:0 2px 14px;line-height:1.5;}

  /* ---- progress ---- */
  .form{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;margin-top:6px;}
  .field{margin-bottom:15px;}
  .field:last-of-type{margin-bottom:18px;}
  .field label{display:block;font-size:13px;font-weight:600;margin-bottom:7px;}
  .field label span{color:var(--ink3);font-weight:400;font-size:12px;}
  .field input,.field select{
    width:100%;border:1px solid var(--line);border-radius:12px;padding:11px 13px;font-size:15px;
    font-family:inherit;background:#FAFCFB;color:var(--ink);appearance:none;
  }
  .field input:focus,.field select:focus{outline:none;border-color:var(--accent);}
  .btn{
    width:100%;background:var(--accent);color:#fff;border:none;border-radius:13px;padding:13px;
    font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:transform .08s;
  }
  .btn:active{transform:scale(.98);}
  .btn.ghost{background:transparent;color:var(--ink3);border:1px solid var(--line);margin-top:9px;}
  .logrow{
    background:var(--card);border:1px solid var(--line);border-radius:15px;padding:13px 15px;
    margin-bottom:9px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;
  }
  .logrow .ld{font-size:12px;color:var(--ink3);flex:0 0 100%;font-weight:600;}
  .logrow .lstat{font-size:13px;}
  .logrow .lstat b{color:var(--accent);font-size:15px;}
  .empty{text-align:center;color:var(--ink3);font-size:13px;padding:24px 0;}
  .gird{background:var(--accent-soft);border:1px solid #CBE3DE;border-radius:18px;padding:16px 18px;margin-top:8px;}
  .gird h3{margin:0 0 8px;font-size:14px;color:var(--p4);}
  .gird p{margin:0;font-size:13px;color:#2C4A46;line-height:1.65;}
  .gird .chain{font-weight:600;color:var(--p4);}

  /* ---- plan ---- */
  .phase{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:0;overflow:hidden;margin-bottom:14px;}
  .ph-head{padding:15px 18px;color:#fff;}
  .ph-head .pw{font-size:12px;opacity:.85;font-weight:600;}
  .ph-head .pt{font-size:17px;font-weight:700;margin-top:2px;}
  .ph-head .pg{font-size:12.5px;opacity:.92;margin-top:5px;}
  .ph-body{padding:14px 18px 16px;}
  .ph-body .lab{font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:.5px;margin:0 0 8px;}
  .ph-body ul{margin:0 0 4px;padding-left:18px;}
  .ph-body li{font-size:13.5px;color:var(--ink);margin-bottom:5px;}
  .ph-body .serve{margin-top:11px;font-size:13px;background:var(--warm-soft);color:#9A5A28;border-radius:11px;padding:9px 12px;}
  .diag{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;margin-bottom:14px;}
  .diag h3{margin:0 0 12px;font-size:15px;}
  .diag ul{margin:0 0 14px;padding-left:18px;}
  .diag li{font-size:13.5px;color:var(--ink);margin-bottom:5px;}
  .diag .goal-line{background:var(--accent-soft);border-radius:12px;padding:11px 13px;font-size:13.5px;color:var(--p4);line-height:1.6;}
  .diag .goal-line b{color:var(--p4);}
  .diag .dnote{font-size:12.5px;color:var(--ink3);line-height:1.65;margin:11px 0 0;}
  .baseline{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;margin-bottom:14px;}
  .baseline h3{margin:0 0 4px;font-size:15px;}
  .baseline .sub{font-size:12px;color:var(--ink3);margin-bottom:14px;}
  .test{border-top:1px solid var(--line);padding:12px 0;}
  .test:last-child{padding-bottom:0;}
  .test .tn{font-size:14px;font-weight:600;}
  .test .td{font-size:13px;color:var(--ink2);margin-top:3px;line-height:1.6;}
  .startcard{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;margin-bottom:14px;}
  .startcard label{font-size:13px;font-weight:600;display:block;margin-bottom:8px;}
  .startcard input{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px 13px;font-size:15px;font-family:inherit;background:#FAFCFB;}
  .startcard p{font-size:12px;color:var(--ink3);margin:9px 0 0;}
  .tip{background:var(--accent-soft);border:1px solid #CBE3DE;border-radius:18px;padding:15px 17px;margin-bottom:30px;font-size:13px;color:#2C4A46;line-height:1.7;}
  .tip b{color:var(--p4);}

  /* ---- self-test comparison ---- */
  .cmp{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;margin-top:6px;}
  .cmp h3{margin:0 0 3px;font-size:15px;}
  .cmp .cmp-sub{font-size:12px;color:var(--ink3);margin-bottom:6px;}
  .cmp-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-top:1px solid var(--line);}
  .cmp-row:first-of-type{border-top:none;}
  .cmp-row .cm-name{font-size:13.5px;font-weight:600;flex:1;min-width:0;}
  .cmp-row .cm-val{font-size:13px;color:var(--ink2);white-space:nowrap;}
  .cmp-row .cm-val b{color:var(--ink);}
  .cmp-row .cm-tag{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;}
  .cm-tag.up{background:var(--accent-soft);color:var(--accent);}
  .cm-tag.flat{background:#EDF2F1;color:var(--ink3);}
  .cm-tag.down{background:var(--warm-soft);color:#9A5A28;}
  .cmp-verdict{margin-top:14px;border-radius:14px;padding:12px 14px;font-size:13.5px;font-weight:600;line-height:1.55;}
  .cmp-verdict.good{background:var(--accent-soft);color:var(--p4);}
  .cmp-verdict.flat{background:#EDF2F1;color:var(--ink2);}
  .cmp-verdict.bad{background:var(--warm-soft);color:#9A5A28;}
  .cmp-empty{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;
    margin-top:6px;font-size:13px;color:var(--ink2);line-height:1.7;}
  .cmp-empty b{color:var(--ink);}

  /* ---- metrics explain ---- */
  .ind{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:14px 16px;margin-bottom:9px;}
  .ind .it{font-size:14px;font-weight:700;}
  .ind .ix{font-size:13px;color:var(--ink2);margin-top:4px;line-height:1.6;}
  .ind .ar{color:var(--accent);font-weight:700;}

  /* ---- tab bar ---- */
  .tabbar{
    position:fixed;left:0;right:0;bottom:0;z-index:40;
    background:rgba(255,255,255,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border-top:1px solid var(--line);display:flex;
    padding:8px 0 calc(8px + env(safe-area-inset-bottom));
  }
  .tab{flex:1;background:none;border:none;font-family:inherit;color:var(--ink3);cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;font-size:11px;}
  .tab svg{width:23px;height:23px;}
  .tab.active{color:var(--accent);}
  .tab.active svg{stroke:var(--accent);}
</style>
</head>
<body>

<div class="topbar">
  <div class="wrap">
    <div class="brand">肩 · 8 周康复<small>无痛发球计划</small></div>
    <div class="topmeta" id="topMeta"></div>
  </div>
</div>

<main class="wrap pad">
  <section id="today" class="active"></section>
  <section id="moves"></section>
  <section id="progress"></section>
  <section id="plan"></section>
</main>

<nav class="tabbar">
  <button class="tab active" data-tab="today">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    今日
  </button>
  <button class="tab" data-tab="moves">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="5" r="2.4"/><path d="M12 8v6M12 14l-4 6M12 14l4 6M6 10l6 1 6-1"/></svg>
    动作
  </button>
  <button class="tab" data-tab="progress">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 20h18"/><rect x="5" y="12" width="3.4" height="6" rx="1"/><rect x="10.3" y="8" width="3.4" height="10" rx="1"/><rect x="15.6" y="4" width="3.4" height="14" rx="1"/></svg>
    进度
  </button>
  <button class="tab" data-tab="plan">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 8h8M8 12h8M8 16h5"/></svg>
    计划
  </button>
</nav>

<script>
/* ===================== DATA ===================== */
var EX = [
  {id:'foam', name:'泡沫轴胸椎伸展', en:'Foam Roller T-Spine', dose:'3 组 × 60 秒', badge:'躺泡沫轴',
   how:'泡沫轴横放在上背，双手抱头，胸椎慢慢向后伸展、再回正，逐节打开僵硬的胸椎。',
   pts:['轴放在肩胛骨下缘附近','只动胸椎、别塌腰','呼气时往下沉一点'],
   fig:{dur:3.2,pose:'lying',L:{u:[-118,-150],f:[14,2]},R:{u:[118,150],f:[-14,-2]}}},

  {id:'wallangel', name:'墙天使', en:'Wall Angel', dose:'3 组 × 10 次', badge:'靠墙',
   how:'后脑、上背、腰贴墙，手臂沿墙面从 W 形慢慢上滑到 Y 形，再滑回来。',
   pts:['全程腰别离墙','手肘、手背尽量贴墙','一耸肩就停下'],
   fig:{dur:3.4,pose:'front',L:{u:[-104,-140],f:[74,16]},R:{u:[104,140],f:[-74,-16]}}},

  {id:'pushupplus', name:'肩胛俯卧撑', en:'Push-up Plus', dose:'3 组 × 15 次', badge:'平板支撑',
   how:'标准支撑姿势、手肘不弯，只把上背往天花板方向顶出去、再收回，发力在两侧肩胛之间。',
   pts:['感受前锯肌发力','别塌腰也别撅臀','幅度小而稳'],
   fig:{dur:1.6,pose:'front',bob:true,L:{u:[-22,-30],f:[-8,-4]},R:{u:[22,30],f:[8,4]}}},

  {id:'sleeper', name:'侧躺内旋拉伸', en:'Sleeper Stretch', dose:'每侧 3 组 × 30 秒', badge:'侧躺',

/* ===================== STORAGE ===================== */
function lsGet(k,d){try{var v=localStorage.getItem(k);return v===null?d:JSON.parse(v);}catch(e){return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function todayISO(){var d=new Date();d.setHours(0,0,0,0);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function getStart(){var s=lsGet('srStart',null);if(!s){s=todayISO();lsSet('srStart',s);}return s;}
function dayNum(){
  var s=getStart().split('-'); var start=new Date(+s[0],+s[1]-1,+s[2]);
  var t=todayISO().split('-'); var now=new Date(+t[0],+t[1]-1,+t[2]);
  var d=Math.floor((now-start)/86400000)+1; return d<1?1:d;
}
function weekNum(){return Math.ceil(dayNum()/7);}
function phaseNum(){var d=dayNum();return d<=14?1:d<=28?2:d<=42?3:4;}
function phaseForDay(d){return d<=14?1:d<=28?2:d<=42?3:4;}
function isoOf(d){d.setHours(0,0,0,0);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function dayNumFor(dateStr){
  var s=getStart().split('-'); var start=new Date(+s[0],+s[1]-1,+s[2]);
  var t=dateStr.split('-'); var d=new Date(+t[0],+t[1]-1,+t[2]);
  return Math.floor((d-start)/86400000)+1;
}
// 扫描所有 srCheck:日期 记录 → {date: 当天打勾数}
function allCheckDays(){
  var out={};
  for(var i=0;i<localStorage.length;i++){
    var k=localStorage.key(i);
    if(k && k.indexOf('srCheck:')===0){
      var map=lsGet(k,{}), n=0;
      for(var id in map){ if(map[id]) n++; }
      if(n>0) out[k.slice(8)]=n;
    }
  }
  return out;
}
// 连续打卡天数：从今天(或昨天)往回数有打卡的天数
function streakCount(days){
  var c=0, cur=new Date(); cur.setHours(0,0,0,0);
  if(!days[isoOf(new Date(cur))]) cur.setDate(cur.getDate()-1);
  while(days[isoOf(new Date(cur))]){ c++; cur.setDate(cur.getDate()-1); }
  return c;
}

function arm(sx,sy,m,dur){
  var u=m.u[0]+';'+m.u[1]+';'+m.u[0];
  var f=m.f[0]+';'+m.f[1]+';'+m.f[0];
  var sp='0.42 0 0.2 1;0.42 0 0.2 1';
  return '<g transform="translate('+sx+','+sy+')">'
    +'<animateTransform attributeName="transform" type="rotate" additive="sum" values="'+u+'" keyTimes="0;0.5;1" dur="'+dur+'s" calcMode="spline" keySplines="'+sp+'" repeatCount="indefinite"/>'
    +'<rect x="-3.4" y="0" width="6.8" height="25" rx="3.4" fill="var(--limb)"/>'
    +'<g transform="translate(0,25)">'

/* ===================== RENDER: TODAY ===================== */
var CHECK='';
function checkKey(){return 'srCheck:'+todayISO();}
// 8 周打卡日历：绿=全部完成 · 浅绿=部分 · 今天高亮 · 未来淡显
function calendar(days){
  var today=todayISO();
  // 只显示到「当前周」或「有记录的最后一周」，避免早期一大片空白
  var lastWeek=weekNum();
  for(var dd in days){ var w=Math.ceil(dayNumFor(dd)/7); if(w>lastWeek) lastWeek=w; }
  if(lastWeek<1) lastWeek=1; if(lastWeek>8) lastWeek=8;
  var s=getStart().split('-'); var start=new Date(+s[0],+s[1]-1,+s[2]);
  var rows='';
  for(var w=1; w<=lastWeek; w++){
    var cells='';
    for(var i=0;i<7;i++){
      var dayIdx=(w-1)*7+i+1; if(dayIdx>56){ cells+='<div class="cell empty"></div>'; continue; }
      var dt=new Date(start); dt.setDate(start.getDate()+dayIdx-1);
      var iso=isoOf(new Date(dt)), dom=dt.getDate();
      var cls='cell', n=days[iso];
      if(n){
        var P=PHASE[phaseForDay(dayIdx)], total=P.list.length;
        cls+= n>=total ? ' done' : ' part';
      } else if(iso>today){ cls+=' future'; }
      if(iso===today) cls+=' today';
      cells+='<div class="'+cls+'">'+dom+'</div>';
    }
    rows+='<div class="calrow"><div class="wk">W'+w+'</div><div class="calgrid">'+cells+'</div></div>';
  }
  return '<div class="cal"><div class="cal-h"><div class="ct">打卡日历</div>'
    +'<div class="cs">累计 '+Object.keys(days).length+' 天</div></div>'
    +rows
    +'<div class="calleg">'
      +'<span><i style="background:var(--accent)"></i>全部完成</span>'
      +'<span><i style="background:var(--accent-soft)"></i>部分完成</span>'
      +'<span><i style="background:#EDF2F1"></i>未打卡</span>'
    +'</div></div>';
}
function renderToday(){
  var ph=phaseNum(), P=PHASE[ph];
  var done=lsGet(checkKey(),{});
  var total=P.list.length, n=0;
  P.list.forEach(function(id){if(done[id])n++;});
  var pct=total?n/total:0;
  var C=2*Math.PI*34, off=C*(1-pct);
  var ring='<svg width="84" height="84" viewBox="0 0 84 84" class="ring">'
    +'<circle cx="42" cy="42" r="34" fill="none" stroke="rgba(255,255,255,.25)" stroke-width="7"/>'
    +'<circle cx="42" cy="42" r="34" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-dasharray="'+C.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'" transform="rotate(-90 42 42)" style="transition:stroke-dashoffset .4s ease"/>'
    +'<text x="42" y="42" text-anchor="middle" dy="-1" fill="#fff" font-size="20" font-weight="700">'+n+'/'+total+'</text>'
    +'<text x="42" y="42" text-anchor="middle" dy="15" fill="rgba(255,255,255,.85)" font-size="9">已完成</text>'
    +'</svg>';
  var days=allCheckDays(), streak=streakCount(days), totalDays=Object.keys(days).length;
  var streakTxt=streak>0?'<div class="streak"><span class="fl">🔥</span>已连续打卡 '+streak+' 天</div>'
    :'<div class="streak"><span class="fl">🎯</span>今天打卡，开启连续记录</div>';

  var html='<div class="summary">'+ring
    +'<div class="sum-info"><div class="day">第 '+dayNum()+' 天</div>'
    +'<div class="ph">第 '+weekNum()+' 周 · 阶段 '+ph+' · '+P.week+'</div>'
    +'<div class="goal">目标：'+P.goal+'</div>'
    +streakTxt+'</div></div>';

  html+=calendar(days);
  html+='<h2 class="sec">今天要做</h2>';
  P.list.forEach(function(id){
    var ex=EXMAP[id], d=!!done[id];
    html+='<div class="check'+(d?' done':'')+'" data-ex="'+id+'">'
      +'<img class="ci-thumb" loading="lazy" src="assets/posters/'+id+'.jpg" alt="">'
      +'<div style="flex:1"><div class="ci-name">'+ex.name+'</div><div class="ci-dose">'+ex.dose+'</div></div>'
      +'<div class="box"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.2"><path d="M5 13l4 4L19 7"/></svg></div></div>';
  });

  html+='<div style="height:8px"></div>';
  document.getElementById('today').innerHTML=html;

  // bind
  document.querySelectorAll('#today .check').forEach(function(el){
    el.addEventListener('click',function(){
      var id=el.getAttribute('data-ex');
      var dd=lsGet(checkKey(),{});
      dd[id]=!dd[id]; lsSet(checkKey(),dd);
      renderToday();
    });
  });
}

  {k:'all',label:'全部'},

  {k:'3', label:'第 5–6 周'},

function renderMoves(){

    return '<button class="seg'+(MFILTER===s.k?' on':'')+'" data-seg="'+s.k+'">'+s.label+'</button>';
  }).join('')+'</div>';

  var ids, head, hint='';
  if(MFILTER==='all'){
    ids=EX.map(function(e){return e.id;});
    head='动作库 · '+EX.length+' 个动作';
  }else{
    var P=PHASE[MFILTER];
    ids=P.list.slice();
    head=P.week+' · 阶段 '+MFILTER+' · '+ids.length+' 个动作';
    hint='目标：'+P.goal+'　🎾 '+P.serve;
  }

  var html=seg+'<h2 class="sec" style="margin-top:14px">'+head+'</h2>';
  if(hint) html+='<div class="seghint">'+hint+'</div>';
  ids.forEach(function(id){ html+=exCard(EXMAP[id]); });
  html+='<div style="height:10px"></div>';
  var m=document.getElementById('moves'); m.innerHTML=html;

  // 分栏点击 → 切换筛选重渲染
  m.querySelectorAll('.seg').forEach(function(b){
    b.addEventListener('click',function(){
      var k=b.getAttribute('data-seg');
      if(k===MFILTER) return;
      MFILTER=k; window.scrollTo(0,0); renderMoves();
    });
  });
  // 每个动作卡片的「已训练完成」打勾（和今日打卡共用同一份记录）
  m.querySelectorAll('.donebtn').forEach(function(b){
    b.addEventListener('click',function(){
      var id=b.getAttribute('data-done');
      var dd=lsGet(checkKey(),{});
      dd[id]=!dd[id]; if(!dd[id]) delete dd[id]; lsSet(checkKey(),dd);
      var on=!!dd[id];
      b.classList.toggle('on',on);
      b.querySelector('.db-txt').textContent=on?'已训练完成':'标记已完成';
    });
  });
  // 动作示范用「动图 GIF」当普通图片：手机上必然会动，无自动播放限制、无解码数量上限、
  // 滚动不会被中断重来。loading=lazy 滑到哪张才下载哪张；下载前先用真人静帧海报做占位背景。
}

/* ===================== RENDER: PROGRESS ===================== */
var ROMLV=['做不到 / 离墙多','能贴墙一部分','大部分能贴墙','全程贴墙'];
function dnum(ds){var a=ds.split('-');return new Date(+a[0],+a[1]-1,+a[2]).getTime();}
function mdfmt(ds){var a=ds.split('-');return (+a[1])+'/'+(+a[2]);}
// 好转自测：以「第一次记录」为基线，锻炼满一周后才对比，逐项判断 好转/持平/退步
function selfTestHtml(logs){
  var todayMs=dnum(todayISO());
  // 0 次：先记基线
  if(logs.length===0){
    return '<div class="cmp-empty"><b>好转自测怎么用</b><br>今天先用下面的表格记一次「基线」'
      +'（发球疼痛 / 连续发球数 / 活动度 / 次日恢复）。锻炼<b>满一周</b>后再重测一次，'
      +'这里会自动对比基线，告诉你练得有没有效。</div>';
  }
  var base=logs[0];
  var elapsed=Math.floor((todayMs-dnum(base.date))/86400000);
  // 不满一周：累积中，给倒计时（康复看周不看天，避免太早下结论误导）
  if(elapsed<7){
    return '<div class="cmp-empty"><b>好转自测 · 累积中</b><br>基线已记录（'+mdfmt(base.date)+'）。'
      +'康复<b>看周不看天</b>，锻炼满一周再看效果才准。<br>还差 <b>'+(7-elapsed)+' 天</b>到第一次对比 —— '
      +'这几天照常打卡、按计划练就好。</div>';
  }
  var latest=logs[logs.length-1];
  // 满一周但还没复测（只有基线那一条）：提示今天复测
  if(latest.date===base.date){
    return '<div class="cmp-empty"><b>好转自测 · 该复测了</b><br>距基线（'+mdfmt(base.date)+'）已经 <b>'
      +elapsed+' 天</b>。今天用下面的表格<b>重测一次</b>，这里就会和基线对比，看这一周练得有没有效。</div>';
  }
  var span=Math.round((dnum(latest.date)-dnum(base.date))/86400000);
  var metrics=[
    {k:'pain', name:'发球疼痛', better:'down'},
    {k:'serve',name:'连续发球数', better:'up', unit:' 个'},
    {k:'rom',  name:'肩关节活动度', better:'up', rom:true},
    {k:'next', name:'次日肩膀', better:'down'}
  ];
  var rows='', up=0, down=0, flat=0;
  metrics.forEach(function(m){
    var bv, lv, bShow, lShow;
    if(m.rom){
      bv=ROMLV.indexOf(base.rom); lv=ROMLV.indexOf(latest.rom);
      if(bv<0||lv<0) return;
      bShow=ROMLV[bv].split(' / ')[0]; lShow=ROMLV[lv].split(' / ')[0];
    }else{
      if(base[m.k]===''||base[m.k]==null||latest[m.k]===''||latest[m.k]==null) return;
      bv=+base[m.k]; lv=+latest[m.k]; bShow=base[m.k]+(m.unit||''); lShow=latest[m.k]+(m.unit||'');
    }
    var diff=lv-bv, tag, tcls;
    if(diff===0){ tag='持平'; tcls='flat'; flat++; }
    else if(m.better==='down'?diff<0:diff>0){ tag='好转'; tcls='up'; up++; }
    else { tag='退步'; tcls='down'; down++; }
    rows+='<div class="cmp-row"><div class="cm-name">'+m.name+'</div>'
      +'<div class="cm-val">'+bShow+' → <b>'+lShow+'</b></div>'
      +'<div class="cm-tag '+tcls+'">'+tag+'</div></div>';
  });
  if(!rows){
    return '<div class="cmp-empty"><b>好转自测</b><br>两次记录没有可对比的相同项，下次把同样的指标都填上就能对比了。</div>';
  }
  var vcls, vtxt;
  if(up>down && up>=1){ vcls='good'; vtxt='✅ 总体在好转 —— '+up+' 项进步'+(down?'、'+down+' 项暂时退步':'')+'。保持这个节奏，别急着加力。'; }
  else if(down>up){ vcls='bad'; vtxt='⚠️ '+down+' 项退步、'+up+' 项进步。最近是不是练多了、或发球加太快？回到上一阶段强度，疼就减量。'; }
  else { vcls='flat'; vtxt='➖ 基本持平。康复有平台期很正常，继续记录，重点看「次日恢复」这项。'; }
  return '<div class="cmp"><h3>好转自测 · 对比锻炼前</h3>'
    +'<div class="cmp-sub">'+mdfmt(base.date)+' 基线 → '+mdfmt(latest.date)+'　锻炼 '+span+' 天</div>'
    +rows
    +'<div class="cmp-verdict '+vcls+'">'+vtxt+'</div></div>';
}
function renderProgress(){
  var logs=lsGet('srLog',[]);
  var html='<h2 class="sec">好转自测</h2>'+selfTestHtml(logs)
    +'<h2 class="sec">记录今天</h2>'
    +'<div class="form">'
      +'<div class="field"><label>发球疼痛评分 <span>0 不疼 · 10 不敢发</span></label><input id="pPain" type="number" min="0" max="10" inputmode="numeric" placeholder="0–10"></div>'
      +'<div class="field"><label>连续发球数 <span>发到第几个开始疼</span></label><input id="pServe" type="number" min="0" inputmode="numeric" placeholder="个"></div>'
      +'<div class="field"><label>肩关节活动度（墙天使）</label><select id="pRom"><option value="">选择…</option><option>做不到 / 离墙多</option><option>能贴墙一部分</option><option>大部分能贴墙</option><option>全程贴墙</option></select></div>'
      +'<div class="field"><label>第二天肩膀评分 <span>次日恢复，越低越好</span></label><input id="pNext" type="number" min="0" max="10" inputmode="numeric" placeholder="0–10"></div>'
      +'<button class="btn" id="saveLog">保存今天的记录</button>'
    +'</div>';

  html+='<h2 class="sec">历史记录</h2>';
  if(!logs.length){
    html+='<div class="empty">还没有记录，先填上面那张表。</div>';
  }else{
    logs.slice().reverse().forEach(function(l,i){
      var idx=logs.length-1-i;
      html+='<div class="logrow"><div class="ld">'+l.date+'</div>'
        +(l.pain!==''&&l.pain!=null?'<div class="lstat">疼痛 <b>'+l.pain+'</b></div>':'')
        +(l.serve!==''&&l.serve!=null?'<div class="lstat">连续 <b>'+l.serve+'</b></div>':'')
        +(l.rom?'<div class="lstat">活动度 <b style="font-size:13px">'+l.rom+'</b></div>':'')
        +(l.next!==''&&l.next!=null?'<div class="lstat">次日 <b>'+l.next+'</b></div>':'')
        +'<button class="btn ghost" style="width:auto;padding:5px 12px;margin:0 0 0 auto;font-size:12px" data-del="'+idx+'">删除</button>'
        +'</div>';
    });
  }

  html+='<h2 class="sec">4 个关键指标怎么看</h2>'
    +ind('① 疼痛评分','发球疼痛逐周下降：第1周 6/10 <span class="ar">→</span> 第4周 3/10 <span class="ar">→</span> 第8周 0–1/10。')
    +ind('② 连续发球数','现在约 20 个就开始疼 <span class="ar">→</span> 目标 100 个不疼。')
    +ind('③ 肩关节活动度','墙天使从「贴不上墙」 <span class="ar">→</span> 慢慢能全程贴墙。')
    +ind('④ 次日恢复','最容易被忽略：今天发球、看明早肩膀评分。当天不疼但第二天疼 5 分 = 仍未恢复。');

  html+='<div class="gird"><h3>建议加做的检查 · GIRD</h3>'
    +'<p>找物理治疗师测 <b>GIRD</b>（盂肱关节内旋受限）——发球肩内旋角度是否下降。很多网球肩峰撞击的真正根源是：'
    +'<span class="chain">肩后囊紧张 → 内旋受限 → 肱骨头前上移 → 肩峰撞击</span>。若 GIRD 明显，肩后囊松解和 Sleeper Stretch 的重要性甚至高于力量训练。</p></div>'
    +'<div style="height:10px"></div>';

  document.getElementById('progress').innerHTML=html;

  document.getElementById('saveLog').addEventListener('click',function(){
    var rec={date:todayISO(),
      pain:document.getElementById('pPain').value,
      serve:document.getElementById('pServe').value,
      rom:document.getElementById('pRom').value,
      next:document.getElementById('pNext').value};
    if(rec.pain===''&&rec.serve===''&&rec.rom===''&&rec.next===''){return;}
    var L=lsGet('srLog',[]);
    // 同一天覆盖
    L=L.filter(function(x){return x.date!==rec.date;});
    L.push(rec); L.sort(function(a,b){return a.date<b.date?-1:1;});
    lsSet('srLog',L); renderProgress();
  });
  document.querySelectorAll('#progress [data-del]').forEach(function(b){
    b.addEventListener('click',function(){
      var i=+b.getAttribute('data-del'); var L=lsGet('srLog',[]); L.splice(i,1); lsSet('srLog',L); renderProgress();
    });
  });
}
function ind(t,x){return '<div class="ind"><div class="it">'+t+'</div><div class="ix">'+x+'</div></div>';}

/* ===================== RENDER: PLAN ===================== */
function renderPlan(){
  var html='<div class="diag"><h3>你的情况</h3>'
    +'<ul><li>MRI 提示双侧肩峰撞击</li><li>网球发球后疼痛</li><li>有头前倾倾向</li><li>长期办公</li><li>疑似肱骨前移</li><li>疑似肩后囊紧张（拉伸后舒服很像这个问题）</li></ul>'
    +'<div class="goal-line"><b>目标</b>：8 周内恢复无痛发球，并建立长期不复发的肩部机制。</div>'
    +'<p class="dnote">综合判断：约 70–80% 把握是「肩峰撞击 + 肩后囊紧张（网球肩）」，不只是单纯肩袖无力 —— 这种康复通常比真正的肩袖撕裂快得多，8 周看到明显改善是现实目标。</p></div>';
  html+='<div class="startcard"><label>开始日期</label>'
    +'<input id="startInput" type="date" value="'+getStart()+'">'
    +'<p>改这里会重新对齐「第几天 / 第几周 / 阶段」。今天是第 '+dayNum()+' 天。</p></div>';

  html+='<div class="baseline"><h3>第一步 · 建立基线</h3><div class="sub">今天就做，记下来当对照</div>'
    +test('测试 1 · 疼痛评分','连续发 10 个正常发球，记录疼痛 0–10。')
    +test('测试 2 · 肩关节活动度','背靠墙，双手贴墙举过头顶——能否举直、是否耸肩代偿、腰是否过度拱起。拍照保存。')
    +test('测试 3 · Apley Scratch','一手从上摸背、一手从下摸背，看两手距离，左右对比。')
    +test('测试 4 · 网球专项','连续发 50 个，记录第几个开始疼、是否越来越重。')
    +'</div>';

  [1,2,3,4].forEach(function(p){
    var P=PHASE[p];
    html+='<div class="phase"><div class="ph-head" style="background:'+P.color+'">'
      +'<div class="pw">阶段 '+p+' · '+P.week+'</div><div class="pt">'+P.goal.split(' · ')[0]+'</div>'
      +'<div class="pg">目标：'+P.goal+'</div></div>'
      +'<div class="ph-body"><div class="lab">动作</div><ul>'
      +P.list.map(function(id){return '<li>'+EXMAP[id].name+' · '+EXMAP[id].dose+'</li>';}).join('')
      +'</ul><div class="serve">🎾 '+P.serve+'</div></div></div>';
  });

  html+='<div class="startcard" style="margin-top:4px"><label>重新开始</label>'
    +'<button class="btn ghost" id="resetBtn">清空打卡记录（连续天数 · 日历归零）</button>'
    +'<p>清空所有「今日打卡」记录，并把开始日期重置为今天。进度页的疼痛 / 发球记录不受影响。</p></div>';

  document.getElementById('plan').innerHTML=html;
  document.getElementById('startInput').addEventListener('change',function(){
    if(this.value){lsSet('srStart',this.value);renderAll();}
  });
  document.getElementById('resetBtn').addEventListener('click',function(){
    if(!confirm('确定清空所有打卡记录？\n连续天数和日历会归零，开始日期重置为今天。\n（进度页的疼痛 / 发球记录会保留）')) return;
    Object.keys(localStorage).filter(function(k){return k.indexOf('srCheck:')===0;})
      .forEach(function(k){localStorage.removeItem(k);});
    lsSet('srStart',todayISO());
    renderAll();
    document.querySelector('.tab[data-tab="today"]').click();
  });
}
function test(t,d){return '<div class="test"><div class="tn">'+t+'</div><div class="td">'+d+'</div></div>';}

/* ===================== NAV ===================== */
function renderAll(){renderToday();renderMoves();renderProgress();renderPlan();updateTopMeta();}
function updateTopMeta(){document.getElementById('topMeta').textContent='第 '+dayNum()+' 天 · 阶段 '+phaseNum();}
function syncMovesDone(){
  var dd=lsGet(checkKey(),{});
  document.querySelectorAll('#moves .donebtn').forEach(function(b){
    var on=!!dd[b.getAttribute('data-done')];
    b.classList.toggle('on',on);
    var t=b.querySelector('.db-txt'); if(t) t.textContent=on?'已训练完成':'标记已完成';
  });
}
document.querySelectorAll('.tab').forEach(function(t){
  t.addEventListener('click',function(){
    var name=t.getAttribute('data-tab');
    document.querySelectorAll('.tab').forEach(function(x){x.classList.toggle('active',x===t);});
    document.querySelectorAll('section').forEach(function(s){s.classList.toggle('active',s.id===name);});
    window.scrollTo(0,0);
    if(name==='today') renderToday();        // 反映在动作页打的勾
    else if(name==='moves') syncMovesDone();  // 反映在今日页打的勾（不重载视频）
  });
});
renderAll();
</script>
